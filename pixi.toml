# pixi.toml
[workspace]
name = "kececinumbers"
version = "1.0.4"
authors = ["Mehmet Keçeci <mkececi@yaani.com>"]
preview = ["pixi-build"]

channels = [
  "conda-forge",
  "https://prefix.dev/conda-forge",
  "https://conda.modular.com/max-nightly",
  "https://repo.prefix.dev/modular-community",
]

# Tüm major platformlar
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

# ──────────────────────────────────────────
[package]
name = "kececinumbers"
version = "1.0.4"
license = "AGPL-3.0-or-later"

[package.build.backend]
name = "pixi-build-python"
version = "*"

# Derleme sırasında gereken araçlar (conda-forge'dan gelir)
[package.host-dependencies]
hatchling = ">=1.28.0"
setuptools-scm = ">=9.2.2"

# ──────────────────────────────────────────
# Conda ortamı — sistem/araç bağımlılıkları
[dependencies]
python = ">=3.11"
rattler-build = ">=0.66.1,<0.67"

# ──────────────────────────────────────────
# PyPI'dan gelen runtime bağımlılıkları
[pypi-dependencies]
numpy = ">=1.24.0"
requests = ">=2.32.0"
matplotlib = ">=3.7.0"
scipy = ">=1.11.0"
scikit-learn = ">=1.3.0"
sympy = ">=1.12.0"

# ──────────────────────────────────────────
# Geliştirme araçları (sadece dev ortamında)
[feature.dev.dependencies]
ruff = ">=0.9.0"
pytest = ">=8.0"

[feature.dev.pypi-dependencies]
# python-build PyPI'da "build" adıyla geçer; conda'da "python-build" ama
# pixi-build-python backend'i varken buna genellikle gerek kalmaz.
# Eğer `python -m build` çalıştırmak istersen:
kececinumbers = { path = ".", editable = true }
build = ">=1.2"

[environments]
default = { features = ["dev"], solve-group = "default" }

# ──────────────────────────────────────────
[tasks]
# Kod kalitesi
fmt     = "ruff format ."
lint    = "ruff check ."
fix     = "ruff check --fix . || true"
# Paket — pixi-build-python varken `pixi build` tercih edilir
build   = "python -m build"
# Çalıştırma
start   = "python -c 'import kececinumbers; print(kececinumbers.__version__)'"
# Dokümantasyon
serve   = { cmd = "python -m http.server 8080", cwd = "docs" }
# Geliştirme kurulumu ve test
install = "pip install -e ."
test    = "pytest -v"           # artık depends-on ["install"] gerekmiyor
# Uzak sürüm kurulumu (CI/test amaçlı)
install-remote = "pip install git+https://github.com/WhiteSymmetry/kececinumbers"
