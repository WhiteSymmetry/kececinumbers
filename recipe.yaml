schema_version: 1

context:
  version: "1.0.6"
  name: kececinumbers
  python_min: "3.11"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 88e6cb6250ef4733f449cb16201ced7777bc11313e3d9c9b3ec0f54236c818a0

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.28.0
  run:
    - python >=${{ python_min }}
    - numpy >=1.24.0
    - requests >=2.32.0
    - matplotlib >=3.7.0
    - scipy >=1.11.0
    - scikit-learn >=1.3.0
    - sympy >=1.12.0

tests:
  - python:
      imports:
        - kececinumbers
      pip_check: true
  - script:
      - python -c "import kececinumbers; print(kececinumbers.__version__)"
      - python -c "import numpy, requests, matplotlib, scipy, sklearn, sympy"
