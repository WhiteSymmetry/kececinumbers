schema_version: 1

context:
  version: "1.0.5"
  name: kececinumbers
  python_min: "3.11"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 4a8fa50272479bcfd69d4b7d3ab447e38f15e26a5f71a7ab6f84a56a0fd06bf6

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.28.0
  run:
    - python >=${{ python_min }}
    - numpy >=1.24.0
    - requests >=2.32.0
    - matplotlib >=3.7.0
    - scipy >=1.11.0
    - scikit-learn >=1.3.0
    - sympy >=1.12.0

tests:
  - python:
      imports:
        - kececinumbers
      pip_check: true
  - script:
      - python -c "import kececinumbers; print(kececinumbers.__version__)"
      - python -c "import numpy, requests, matplotlib, scipy, sklearn, sympy"
