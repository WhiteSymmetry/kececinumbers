# .github/workflows/pixi.yml
name: Pixi Release

on:
  push:
    tags:
      - "v*"          # v1.0.4, v2.0.0 gibi tag'lerde tetiklenir

# prefix.dev OIDC trusted publishing için (API key yerine alternatif)
# eğer API key kullanıyorsan bu bloğu kaldırabilirsin
permissions:
  contents: read
  id-token: write   # OIDC için gerekli (trusted publishing)

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Testler
  # ────────────────────────────────────────────────────────────
  test:
    name: Test (linux-64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.47.0
          cache: true
          # prefix.dev özel kanalın için kimlik doğrulama (install sırasında)
          auth-host: prefix.dev
          auth-token: ${{ secrets.PIXI_TOKEN }}

      - name: Lint
        run: pixi run lint

      - name: Test
        run: pixi run test

  # ────────────────────────────────────────────────────────────
  # JOB 2: Conda paketi derle ve prefix.dev'e yayınla
  # ────────────────────────────────────────────────────────────
  build-and-publish:
    name: Build & Publish conda package
    runs-on: ubuntu-latest
    needs: test          # testler geçmeden yayınlama

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tag'dan versiyon numarasını çıkar (v1.0.4 → 1.0.4)
      - name: Parse version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # rattler-build'i yükle ve conda.recipe/recipe.yaml'ı derle
      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.38
        with:
          recipe-path: conda.recipe/recipe.yaml
          build-args: >-
            --target-platform linux-64
            -c conda-forge
            -c https://prefix.dev/conda-forge
          upload-artifact: true
          artifact-name: conda-package-linux-64

      # prefix.dev'e yükle — API key ile
      - name: Upload to prefix.dev
        shell: bash
        env:
          PIXI_TOKEN: ${{ secrets.PIXI_TOKEN }}
        run: |
          # Tüm .conda ve .tar.bz2 dosyalarını yükle
          # Kanal adını kendi prefix.dev kanal adınla değiştir!
          for pkg in $(find output -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading: $pkg"
            rattler-build upload prefix \
              --channel kececinumbers \
              --api-key "$PIXI_TOKEN" \
              "$pkg" || echo "Warning: upload failed for $pkg (duplicate?)"
          done

  # ────────────────────────────────────────────────────────────
  # JOB 3: PyPI'ya da yayınla (opsiyonel)
  # ────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi   # GitHub Environment ile koruma (opsiyonel)

    permissions:
      contents: read
      id-token: write   # PyPI trusted publishing için

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.47.0
          cache: true

      - name: Build Python package
        run: pixi run build   # python -m build → dist/ klasörüne yazar

      #- name: Publish to PyPI
        #uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publishing kullandığında api-token gerekmez
        # Eğer API token kullanıyorsan aşağıyı aç:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
