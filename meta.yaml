# meta.yaml
package:
  name: kececinumbers
  version: "0.0.0"

source:
  url: ""
  blake2b-256: ""
  exclude:
    - docs/*
    - notebooks/*
    - tests/*
    - test/*
    - examples/*
    - build/*
    - dist/*
    - .git/*
    - .github/*
    - "*.egg-info"
    - "*.pyc"
    - "__pycache__"

build:
  number: 0
  noarch: python
  #script: "{{ PYTHON }} -m pip install . -vv"
  script: |
    {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  # --no-deps: Bağımlılıkları pip kurmasın (conda kuracak)
  # --no-build-isolation: Daha hızlı build

requirements:
  host:
    - python {{ python }}
    - numpy
    - setuptools
    - pip    
    # Other build tools
  run:
    - python >=3.11
    - numpy
    - matplotlib
    - scipy
    - scikit-learn
    - sympy
    # Other runtime dependencies
  build:
    - python >=3.11
    - pip
    - setuptools
    - numpy
    - matplotlib
    - scipy
    - scikit-learn
    - sympy

test:
  requires:
    - matplotlib
    - scipy
    - scikit-learn
    - sympy
    - numpy
  imports:
    - kececinumbers
    - matplotlib.pyplot
    - matplotlib.gridspec
    - scipy.fft
    - scipy.signal
    - scipy.stats
    - scikit-learn
    - numpy
  commands:
    - python -c "import kececinumbers; print(kececinumbers.__version__)"

about:
  home: https://github.com/WhiteSymmetry/kececinumbers
  license: AGPL-3.0-or-later
  summary: "Keçeci Numbers: An Exploration of a Dynamic Sequence Across Diverse Number Sets"
  description: |
    Keçeci Numbers: An Exploration of a Dynamic Sequence Across Diverse Number Sets.
  dev_url: https://github.com/WhiteSymmetry/kececinumbers
  doc_url: https://kececinumbers.readthedocs.io
  doc_source_url: https://github.com/WhiteSymmetry/kececinumbers/blob/main/README.md

extra:
  recipe-maintainers:
    - WhiteSymmetry
